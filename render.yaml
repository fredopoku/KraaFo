services:
  - type: web
    name: krafo
    runtime: node
    buildCommand: apt-get install -y wget gnupg ca-certificates && wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add - && sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list' && apt-get update -y && apt-get install -y google-chrome-stable --no-install-recommends && npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix server && npm run build --prefix client
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/krafo.db
      - key: UPLOAD_DIR
        value: /data/uploads

      # AI — Smart Fill & document import (set in Render dashboard)
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # Platform email — set in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

    disk:
      name: krafo-data
      mountPath: /data
      sizeGB: 1
