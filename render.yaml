services:
  - type: web
    name: krafo
    runtime: node
    buildCommand: npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix server && npm run build --prefix client
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/krafo.db
      - key: UPLOAD_DIR
        value: /data/uploads

      # Frontend URL — used in unsubscribe links inside broadcast emails
      - key: FRONTEND_URL
        value: https://kraafo.onrender.com

      # AI — Smart Fill & document import (set in Render dashboard)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # Email via Resend (recommended — invoice delivery, welcome & broadcast emails)
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: invoices@kraafo.com

      # Email via custom SMTP (alternative to Resend, set in Render dashboard)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

    disk:
      name: krafo-data
      mountPath: /data
      sizeGB: 1
